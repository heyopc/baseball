<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>MLB Score Ticker</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main id="ticker" class="ticker">

        <!-- LEFT BRAND AREA -->
        <section class="ticker-brand" aria-label="MLB scoreboard">
            <div class="brand-top">
                <img
                    class="brand-logo"
                    src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Major_League_Baseball_logo.svg/1280px-Major_League_Baseball_logo.svg.png"
                    alt="MLB"
                >

                <span class="brand-text">MLB</span>
            </div>

            <div id="ticker-date" class="brand-date">
                TODAY
            </div>
        </section>

        <!-- GAME CARDS -->
        <section class="scores-viewport">
            <div id="scores-track" class="scores-track">
                <div class="message-card">
                    <div class="loading-spinner"></div>
                    <span>Loading MLB scores…</span>
                </div>
            </div>
        </section>

        <!-- RIGHT STATUS AREA -->
        <section class="ticker-meta">
            <div class="meta-live-row">
                <span id="live-dot" class="live-dot"></span>
                <span id="connection-label">LIVE SCORES</span>
            </div>

            <div id="page-indicator" class="page-indicator">
                1 / 1
            </div>

            <div id="last-updated" class="last-updated">
                UPDATING
            </div>
        </section>

        <!-- BOTTOM CRAWL -->
        <section class="ticker-bottom">
            <div id="bottom-label" class="bottom-label">
                MLB SCOREBOARD
            </div>

            <div class="bottom-marquee-viewport">
                <div id="bottom-marquee-track" class="bottom-marquee-track">
                    <div
                        id="bottom-marquee-one"
                        class="bottom-marquee-content"
                    >
                        MLB scores update automatically.
                    </div>

                    <div
                        id="bottom-marquee-two"
                        class="bottom-marquee-content"
                        aria-hidden="true"
                    >
                        MLB scores update automatically.
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
